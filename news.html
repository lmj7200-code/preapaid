<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>소식 | 마크통신 Ntelecom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      color: #1a1a2e; background: #f0f4ff; line-height: 1.6;
    }
    a { text-decoration: none; color: inherit; }
    :root {
      --grad-main: linear-gradient(135deg, #4f8ef7 0%, #1a56db 50%, #6c2fd4 100%);
      --blue: #1a56db;
      --blue-light: #e8f0fe;
      --radius: 16px;
      --shadow: 0 4px 20px rgba(79,142,247,.12);
    }
    .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }

    /* 헤더 */
    header {
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(79,142,247,.15);
      height: 64px; display: flex; align-items: center;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 16px rgba(79,142,247,.08);
    }
    .header-inner { display: flex; align-items: center; justify-content: space-between; width: 100%; }
    .logo {
      font-size: 1.1rem; font-weight: 900;
      background: var(--grad-main);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: .85rem; font-weight: 600; color: var(--blue);
      padding: 7px 14px; border-radius: 8px;
      border: 1.5px solid var(--blue); transition: background .2s;
    }
    .back-btn:hover { background: var(--blue-light); }

    /* 페이지 헤더 */
    .page-hero {
      background: #fff; padding: 48px 24px 0;
      border-bottom: 1px solid #eef0f6;
    }
    .page-hero h1 {
      font-size: 2rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: 8px;
    }
    .page-hero h1 span {
      background: var(--grad-main);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .page-hero p { color: #666; font-size: .92rem; margin-bottom: 28px; }

    /* 카테고리 필터 */
    .filter-bar { display: flex; flex-wrap: wrap; gap: 8px; padding-bottom: 0; }
    .filter-btn {
      padding: 7px 18px; border-radius: 20px;
      font-size: .82rem; font-weight: 700;
      border: 1.5px solid #ddd; background: #fff; color: #666;
      cursor: pointer; transition: all .2s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--grad-main); color: #fff; border-color: transparent;
      box-shadow: 0 4px 12px rgba(79,142,247,.3);
    }
    .filter-divider { border: none; border-top: 1px solid #eef0f6; margin: 0; }

    /* 게시물 목록 */
    .posts-section { padding: 32px 24px 64px; }
    .posts-list { display: flex; flex-direction: column; }
    .post-item {
      background: #fff; border-radius: var(--radius);
      padding: 24px 28px; margin-bottom: 14px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.9);
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      display: flex; flex-direction: column; gap: 8px;
    }
    .post-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(79,142,247,.18);
    }
    .post-item.hidden { display: none; }
    .post-top { display: flex; align-items: center; gap: 10px; }
    .cat-badge {
      display: inline-block;
      font-size: .72rem; font-weight: 700; padding: 3px 12px; border-radius: 20px;
    }
    .cat-개통가이드 { background: #e8f0fe; color: #1a56db; }
    .cat-선불폰    { background: #f3e8ff; color: #6c2fd4; }
    .cat-유심      { background: #e8fff3; color: #0a7c4a; }
    .cat-요금제    { background: #fff3e8; color: #b45309; }
    .cat-꿀팁      { background: #fce8ff; color: #a21caf; }
    .post-date { font-size: .78rem; color: #aaa; margin-left: auto; }
    .post-title {
      font-size: 1.05rem; font-weight: 800; color: #1a1a2e;
      letter-spacing: -.01em; line-height: 1.4;
    }
    .post-summary { font-size: .85rem; color: #666; line-height: 1.65; }
    .post-author { font-size: .78rem; color: #aaa; }

    /* 빈 상태 */
    .empty-state {
      text-align: center; padding: 64px 24px; color: #aaa;
      display: none;
    }
    .empty-state.show { display: block; }
    .empty-state p { font-size: .9rem; margin-top: 8px; }

    /* 글쓰기 안내 (관리자용) */
    .write-tip {
      background: linear-gradient(135deg, #e8f0fe, #f3e8ff);
      border-radius: var(--radius); padding: 20px 24px;
      margin-bottom: 24px;
      border: 1px dashed rgba(79,142,247,.3);
      display: flex; align-items: center; gap: 14px;
    }
    .write-tip .tip-icon { font-size: 1.6rem; flex-shrink: 0; }
    .write-tip h4 { font-size: .9rem; font-weight: 800; color: var(--blue); margin-bottom: 3px; }
    .write-tip p { font-size: .8rem; color: #666; line-height: 1.5; }

    /* 푸터 */
    footer {
      background: #0d1117; color: #666;
      padding: 28px 24px; font-size: .8rem; text-align: center; line-height: 1.9;
    }
    footer strong { color: #aaa; }

    @media (max-width: 600px) {
      .post-item { padding: 18px 18px; }
      .page-hero h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <header>
    <div class="container header-inner">
      <div class="logo">마크통신 Ntelecom</div>
      <a href="sunbulpon-gaetong.html" class="back-btn">← 홈으로</a>
    </div>
  </header>

  <!-- 페이지 헤더 -->
  <div class="page-hero">
    <div class="container">
      <h1><span>마크통신</span> 소식</h1>
      <p>선불폰 개통 가이드, 유심 정보, 요금제 비교 등 유용한 정보를 알려드립니다.</p>
      <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-cat="전체">전체</button>
        <button class="filter-btn" data-cat="개통가이드">개통가이드</button>
        <button class="filter-btn" data-cat="선불폰">선불폰</button>
        <button class="filter-btn" data-cat="유심">유심</button>
        <button class="filter-btn" data-cat="요금제">요금제</button>
        <button class="filter-btn" data-cat="꿀팁">꿀팁</button>
      </div>
    </div>
  </div>
  <hr class="filter-divider" />

  <!-- 게시물 목록 -->
  <section class="posts-section">
    <div class="container">

      <!-- ✏️ 글 추가 안내 -->
      <div class="write-tip">
        <div class="tip-icon">✏️</div>
        <div>
          <h4>새 글 추가하는 방법</h4>
          <p>이 파일(news.html) 하단 &lt;script&gt; 안의 <strong>posts 배열</strong>에 항목을 추가하면 바로 목록에 나타납니다.</p>
        </div>
      </div>

      <div class="posts-list" id="postsList"></div>
      <div class="empty-state" id="emptyState">
        <div style="font-size:2.5rem">📭</div>
        <p>해당 카테고리의 글이 없습니다.</p>
      </div>
    </div>
  </section>

  <!-- 푸터 -->
  <footer>
    <p><strong>마크통신 선불폰</strong> &nbsp;|&nbsp; 대표: 이명준</p>
    <p style="margin-top:8px; color:#444;">© 2024 Anthlecome. All rights reserved.</p>
  </footer>

  <script>
    // ============================================================
    // ✏️ 글 추가 방법:
    // 아래 posts 배열에 객체를 하나 추가하세요.
    // {
    //   title: "글 제목",
    //   cat: "카테고리",        // 개통가이드 / 선불폰 / 유심 / 요금제 / 꿀팁
    //   date: "2026.04.22",
    //   summary: "요약 내용",
    //   link: "연결할 파일명.html"  // 없으면 "" 로 비워두세요
    // }
    // ============================================================
    const posts = [
      {
        title: "편의점 선불유심 구매 방법 CU·GS25·이마트24 구매부터 개통까지",
        cat: "개통가이드",
        date: "2026.04.20",
        summary: "편의점 선불유심 구매 방법을 CU·GS25·이마트24별로 정리했습니다. KT 바로유심·LG 원칩 가격, 구매처, 비대면 셀프개통까지 한 번에 확인하세요.",
        link: ""
      },
      {
        title: "대리기사·배달라이더 업무용 폰, 선불유심 셀프개통이 답인 이유",
        cat: "꿀팁",
        date: "2026.04.16",
        summary: "업무용 선불유심 셀프개통으로 대리기사, 배달라이더, 투잡러의 두 번째 폰을 5분 만에 해결하는 방법. 약정·신용조회 없이 편의점에서 유심 구매 후 비대면 개통.",
        link: ""
      },
      {
        title: "선불폰 가입제한 해제 방법 2가지",
        cat: "꿀팁",
        date: "2026.04.14",
        summary: "선불폰 가입제한 해제 방법을 PASS·카카오뱅크 앱으로 1분 만에 끝내는 전 과정을 스크린샷과 함께 정리했습니다.",
        link: ""
      },
      {
        title: "선불폰 vs 알뜰폰 후불 차이 5가지 비교",
        cat: "꿀팁",
        date: "2026.04.13",
        summary: "신용조회, 요금, 개통 속도 등 선불폰과 알뜰폰 후불의 주요 차이점을 비교합니다.",
        link: ""
      },
      {
        title: "외국인 핸드폰 개통, 여권으로 가능한 방법",
        cat: "개통가이드",
        date: "2026.04.08",
        summary: "비자별 개통 방법과 외국인등록증 변경 절차를 설명합니다.",
        link: ""
      },
      {
        title: "통신사 미납 핸드폰 개통",
        cat: "개통가이드",
        date: "2026.04.07",
        summary: "3사 미납자도 즉시 개통 가능한 선불폰 방법을 소개합니다.",
        link: ""
      },
      {
        title: "선불폰 셀프 개통 안면인식 진행가이드",
        cat: "개통가이드",
        date: "2026.02.23",
        summary: "신규가입부터 신원확인까지 단계별 실행 순서 안내. 6단계로 5분 안에 완료하세요.",
        link: "face-auth.html"
      },
      {
        title: "유심 인식 안될 때 해결법 5가지",
        cat: "꿀팁",
        date: "2026.03.18",
        summary: "전원 재시작부터 수동 네이밍까지 단계별 해결 방법을 안내합니다.",
        link: ""
      },
      {
        title: "선불폰 개통 방법 총정리",
        cat: "개통가이드",
        date: "2026.02.23",
        summary: "K망·L망 개념부터 요금제, 준비물, 개통 방법까지 한눈에 정리했습니다.",
        link: ""
      },
      {
        title: "신용불량자도 선불폰 개통 가능한가",
        cat: "선불폰",
        date: "2026.02.23",
        summary: "신용 문제와 무관하게 누구나 개통 가능한 선불폰의 특징을 설명합니다.",
        link: ""
      },
      {
        title: "선불폰 유심 호환 총정리",
        cat: "유심",
        date: "2026.02.23",
        summary: "KT 바로유심과 LG 원칩의 특징·가격·호환성을 비교합니다.",
        link: ""
      },
    ];

    // 렌더링
    function renderPosts(cat) {
      const list = document.getElementById('postsList');
      const empty = document.getElementById('emptyState');
      const filtered = cat === '전체' ? posts : posts.filter(p => p.cat === cat);
      list.innerHTML = '';
      if (filtered.length === 0) { empty.classList.add('show'); return; }
      empty.classList.remove('show');
      filtered.forEach(p => {
        const el = document.createElement('div');
        el.className = 'post-item';
        el.innerHTML = `
          <div class="post-top">
            <span class="cat-badge cat-${p.cat}">${p.cat}</span>
            <span class="post-date">${p.date}</span>
          </div>
          <div class="post-title">${p.title}</div>
          <div class="post-summary">${p.summary}</div>
          <div class="post-author">마크통신 선불폰</div>
        `;
        if (p.link) el.onclick = () => location.href = p.link;
        list.appendChild(el);
      });
    }

    // 카테고리 필터
    document.getElementById('filterBar').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderPosts(btn.dataset.cat);
    });

    renderPosts('전체');
  </script>

</body>
</html>
