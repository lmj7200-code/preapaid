    a { text-decoration: none; color: inherit; }
    :root {
      --grad-main: linear-gradient(135deg, #8fa8c0 0%, #4a6580 50%, #2e4c68 100%);

      --blue-light: #f5fef0;
      --radius: 16px;
      --shadow: 0 4px 20px rgba(74,101,128,.12);

    .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }

    header {
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(74,101,128,.15);
      height: 64px; display: flex; align-items: center;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 16px rgba(74,101,128,.08);
    }
    .header-inner { display: flex; align-items: center; justify-content: space-between; width: 100%; }
    .logo {
      font-size: 1.1rem; font-weight: 900;
      background: var(--grad-main);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: .85rem; font-weight: 600; color: var(--blue);
      padding: 7px 14px; border-radius: 8px;
      border: 1.5px solid var(--blue); transition: background .2s;
    }
    .back-btn:hover { background: var(--blue-light); }

    /* 페이지 헤더 */
    .page-hero {
      background: #fff; padding: 48px 24px 0;
      border-bottom: 1px solid #eef0f6;
    }
    .page-hero h1 {
      font-size: 2rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: 8px;
    }
    .page-hero h1 span {
      background: var(--grad-main);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .page-hero p { color: #666; font-size: .92rem; margin-bottom: 28px; }

    /* 카테고리 필터 */
    .filter-bar { display: flex; flex-wrap: wrap; gap: 8px; padding-bottom: 0; }
    .filter-btn {
      padding: 7px 18px; border-radius: 20px;
      font-size: .82rem; font-weight: 700;
      border: 1.5px solid #ddd; background: #fff; color: #666;
      cursor: pointer; transition: all .2s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--grad-main); color: #fff; border-color: transparent;
      box-shadow: 0 4px 12px rgba(74,101,128,.3);
    }
    .filter-divider { border: none; border-top: 1px solid #eef0f6; margin: 0; }

    /* 게시물 목록 */
    .posts-section { padding: 32px 24px 64px; }
    .posts-list { display: flex; flex-direction: column; }
    .post-item {
      background: #fff; border-radius: var(--radius);
      padding: 24px 28px; margin-bottom: 14px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.9);
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      display: flex; flex-direction: column; gap: 8px;
    }
    .post-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(74,101,128,.18);
    }
    .post-item.hidden { display: none; }
    .post-top { display: flex; align-items: center; gap: 10px; }
    .cat-badge {
      display: inline-block;
      font-size: .72rem; font-weight: 700; padding: 3px 12px; border-radius: 20px;
    }
    .cat-개통가이드 { background: #f5fef0; color: #4a6580; }
    .cat-선불폰    { background: #f3e8ff; color: #2e4c68; }
    .cat-유심      { background: #e8fff3; color: #0a7c4a; }
    .cat-요금제    { background: #fff3e8; color: #b45309; }
    .cat-꿀팁      { background: #fce8ff; color: #a21caf; }
    .post-date { font-size: .78rem; color: #aaa; margin-left: auto; }
    .post-title {
      font-size: 1.05rem; font-weight: 800; color: #1a1a2e;
      letter-spacing: -.01em; line-height: 1.4;
    }
    .post-summary { font-size: .85rem; color: #666; line-height: 1.65; }
    .post-author { font-size: .78rem; color: #aaa; }

    /* 빈 상태 */
    .empty-state {
      text-align: center; padding: 64px 24px; color: #aaa;
      display: none;
    }
    .empty-state.show { display: block; }
    .empty-state p { font-size: .9rem; margin-top: 8px; }

    /* 로딩 */
    .loading-state { text-align:center; padding:64px 24px; color:#aaa; font-size:.9rem; display:none; }
    .loading-state.show { display:block; }
    .loading-spinner { width:36px; height:36px; border:3px solid #e0e7ff; border-top-color:#4a6580; border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 14px; }

    /* 글쓰기 안내 (관리자용) */
    .write-tip {
      background: linear-gradient(135deg, #f5fef0, #f3e8ff);
      border-radius: var(--radius); padding: 20px 24px;
      margin-bottom: 24px;
      border: 1px dashed rgba(74,101,128,.3);
      display: flex; align-items: center; gap: 14px;
    }
    .write-tip .tip-icon { font-size: 1.6rem; flex-shrink: 0; }
    .write-tip h4 { font-size: .9rem; font-weight: 800; color: var(--blue); margin-bottom: 3px; }
    .write-tip p { font-size: .8rem; color: #666; line-height: 1.5; }

    footer {
      background: #0d1117; color: #666;
      padding: 28px 24px; font-size: .8rem; text-align: center; line-height: 1.9;
    }
    footer strong { color: #aaa; }

    @media (max-width: 600px) {
      .post-item { padding: 16px 16px; }
      .page-hero { padding: 32px 20px 0; }
      .page-hero h1 { font-size: 1.5rem; }
      .page-hero p { font-size: .85rem; }
      .posts-section { padding: 24px 20px 48px; }
      .filter-btn { padding: 6px 14px; font-size: .78rem; }
      .post-title { font-size: .97rem; }
      .post-summary { font-size: .82rem; }
      footer { padding: 22px 16px; }
      .write-tip { flex-direction: column; align-items: flex-start; gap: 8px; }
      .write-tip .tip-icon { font-size: 1.3rem; }

       LUXURY 3D SYSTEM — 프리미엄 깊이감

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #fafef8; }

        date: "2026.02.23",
        summary: "KT 바로유심과 LG 원칩의 특징·가격·호환성을 비교합니다.",
        link: ""
      },
    ];

    let allPosts = [];
    let currentCat = '전체';

    // 날짜 포맷 변환 (WordPress → 2026.04.20)
    function formatDate(dateStr) {
      const d = new Date(dateStr);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}.${m}.${day}`;
    }

    // HTML 태그 제거
    function stripTags(html) {
      return html.replace(/<[^>]+>/g, '').replace(/&nbsp;/g, ' ').replace(/&amp;/g, '&').trim();
    }

    // 렌더링
    function renderPosts(cat) {
      const list = document.getElementById('postsList');
      const empty = document.getElementById('emptyState');
      const filtered = cat === '전체' ? allPosts : allPosts.filter(p => p.cat === cat);
      list.innerHTML = '';
      if (filtered.length === 0) { empty.classList.add('show'); return; }
      empty.classList.remove('show');
      filtered.forEach(p => {
        const el = document.createElement('div');
        el.className = 'post-item';
        el.innerHTML = `
          <div class="post-top">
            <span class="cat-badge cat-${p.cat}">${p.cat}</span>
            <span class="post-date">${p.date}</span>
          </div>
          <div class="post-title">${p.title}</div>
          <div class="post-summary">${p.summary}</div>
          <div class="post-author">마크통신 선불폰</div>
        `;
        if (p.link) el.style.cursor = 'pointer';
        if (p.link) el.onclick = () => window.open(p.link, '_blank');
        list.appendChild(el);
      });
    }

    // WordPress REST API에서 포스트 불러오기
    async function loadFromWordPress() {
      const loading = document.getElementById('loadingState');
      loading.classList.add('show');
      try {
        // 카테고리 목록 가져오기
        const catRes = await fetch(`${WP_SITE_URL}/wp-json/wp/v2/categories?per_page=100`);
        if (!catRes.ok) throw new Error('카테고리 로드 실패');
        const categories = await catRes.json();
        const catMap = {};
        categories.forEach(c => { catMap[c.id] = c.name; });

        // 포스트 가져오기
        const postRes = await fetch(`${WP_SITE_URL}/wp-json/wp/v2/posts?per_page=50&status=publish&orderby=date&order=desc`);
        if (!postRes.ok) throw new Error('포스트 로드 실패');
        const wpPosts = await postRes.json();

        allPosts = wpPosts.map(p => ({
          title: stripTags(p.title.rendered),
          cat: p.categories.length > 0 ? (catMap[p.categories[0]] || '전체') : '전체',
          date: formatDate(p.date),
          summary: stripTags(p.excerpt.rendered),
          link: p.link
        }));

        loading.classList.remove('show');
        renderPosts(currentCat);
      } catch (err) {
        console.warn('WordPress 연동 실패, 기본 게시물 표시:', err.message);
        loading.classList.remove('show');
        allPosts = fallbackPosts;
        renderPosts(currentCat);
      }
    }

    // 카테고리 필터
    document.getElementById('filterBar').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = btn.dataset.cat;
      renderPosts(currentCat);
    });

    // 초기 로드
    if (WP_SITE_URL) {
      loadFromWordPress();
    } else {
      allPosts = fallbackPosts;
      renderPosts('전체');
    }
  </script>
